services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/autoconfig.db
      - Jwt__Secret=AutoConfig-SuperSecret-Key-32chars-minimum!!
      - Jwt__Issuer=AutoConfig.Api
      - Jwt__Audience=AutoConfig.Client
      - Jwt__ExpiresInHours=24
      - AllowedOrigins__0=http://localhost:5173
    volumes:
      - autoconfig-data:/data
    restart: unless-stopped

volumes:
  autoconfig-data:
