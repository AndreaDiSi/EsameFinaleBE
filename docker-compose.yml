services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoconfig
      POSTGRES_USER: autoconfig
      POSTGRES_PASSWORD: autoconfig_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoconfig -d autoconfig"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=autoconfig;Username=autoconfig;Password=autoconfig_pass
      - Jwt__Secret=AutoConfig-SuperSecret-Key-32chars-minimum!!
      - Jwt__Issuer=AutoConfig.Api
      - Jwt__Audience=AutoConfig.Client
      - Jwt__ExpiresInHours=24
      - AllowedOrigins__0=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
